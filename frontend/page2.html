<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile - Attendance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg,#ccccff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Ensure profile container matches login container size/style */
        .login-container {
            background:#efebf8;
            border-radius: 70px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        /* Make container center its child so sizes match page1 layout */
        .container {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .profile-card {
            background: #efebf8;
            border-radius: 70px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            padding: 40px;
            width: 100%;
            max-width: 400px; 
            text-align: center;
        }

        .profile-header {
            margin-bottom: 30px;
        }

        .profile-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 5px solid #4facfe;
            object-fit: cover;
            background: linear-gradient(135deg, #4facfe 0%, #8b5cf6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .profile-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-image-placeholder {
            font-size: 60px;
            color: white;
        }

        .profile-header h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .status-badge {
            display: inline-block;
            background: #4caf50;
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .details-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: left;
        }

        .detail-item {
            margin-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 12px;
        }

        .detail-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .detail-label {
            color: #666;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            color: #333;
            font-size: 16px;
            font-weight: 600;
            margin-top: 5px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-direction: column;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
            border-color: #d0d0d0;
        }

        .profile-card {
            position: relative;
        }

        @media (max-width: 600px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
            }

            .navbar h2 {
                font-size: 18px;
            }

            .profile-card {
                padding: 30px 20px;
            }

            .profile-image {
                width: 120px;
                height: 120px;
            }

            .profile-header h1 {
                font-size: 20px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-card login-container">
            <div class="profile-header">
                <div class="profile-image" id="profileImage">
                    <span class="profile-image-placeholder">👤</span>
                </div>
                <h1 id="studentName">Loading...</h1>
                <span class="status-badge">✓ Logged In</span>
            </div>

            <div class="details-section">
                <div class="detail-item">
                    <div class="detail-label">Register Number</div>
                    <div class="detail-value" id="registerNumber">---</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Email</div>
                    <div class="detail-value" id="email">Not provided</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Department</div>
                    <div class="detail-value" id="department">Computer Science</div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" onclick="viewAttendance()">
                    📊 View Attendance
                </button>
                <button class="btn btn-secondary" onclick="logoutStudent()">
                    🚪 Logout
                </button>
            </div>
        </div>
    </div>

    <script>
        // Load student data from localStorage
        function loadStudentData() {
            const studentData = JSON.parse(localStorage.getItem('studentData'));

            if (studentData) {
                // Set name
                document.getElementById('studentName').textContent = studentData.name || 'Unknown Student';

                // Set register number
                document.getElementById('registerNumber').textContent = studentData.registerNumber || '---';


                // Set profile image if available
                if (studentData.profileImage) {
                    const profileImage = document.getElementById('profileImage');
                    profileImage.innerHTML = `<img src="${studentData.profileImage}" alt="Profile">`;
                }
            } else {
                // No student data found, redirect to login
                alert('No student data found. Please login first.');
                window.location.href = 'page1.html';
            }
        }

        // View Attendance function
        function viewAttendance() {
            window.location.href = 'page3.html';
        }

        // Logout function
        function logoutStudent() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('studentData');
                window.location.href = 'page1.html';
            }
        }

        // Load data on page load
        window.addEventListener('DOMContentLoaded', loadStudentData);
    </script>
</body>
</html>
